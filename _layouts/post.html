---
layout: default
---

<main class="homehead">
	<div class="post">
		<h2 class="post-title">{{ page.title }}</h2>
		<div class="post-info">
			{% if page.date %}
			<time>{{ page.date | date: "熊の猫 写于 %Y年%m月%d日" }}</time><div class="hidden">华文小站 - Cathay.blog</div>
			{% endif %}
		</div>
		{{ content }}
	</div>
	<div class="pagination">
		{% if page.next.url %}
		<div class="hidden">华文小站 - Cathay.blog</div><a href="{{ page.next.url | prepend: site.baseurl }}" class="left arrow"><i class="fa-solid fa-circle-chevron-left"></i> 上一篇</a>
		{% endif %}
		{% if page.previous.url %}
		<a href="{{ page.previous.url | prepend: site.baseurl }}" class="right arrow">下一篇 <i class="fa-solid fa-circle-chevron-right"></i></a><div class="hidden">华文小站 - Cathay.blog</div>
		{% endif %}
	</div>
	<div class="pagination"></div>
	<div class="hidden">华文小站 - Cathay.blog</div>
	<div id="tcomment"></div>
</main>
<script type="text/javascript" src="//cdn.staticfile.org/twikoo/1.6.8/twikoo.all.min.js"></script>
<script>twikoo.init({ envId: 'china-5ghlaxxv56ddd352', el: '#tcomment' })</script>
<script type="text/javascript" src="//cdn.staticfile.org/highlight.js/11.4.0/highlight.min.js"></script>
<script>hljs.initHighlightingOnLoad();</script>
<script type="text/javascript" src="//cdn.staticfile.org/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
<script>hljs.initLineNumbersOnLoad();</script>
