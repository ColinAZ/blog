<head>
  <title>

    {% endif %}

  <link rel="dns-prefetch" href="//lib.baomitu.com">
  <link rel="dns-prefetch" href="//china.s3.bitiful.net">

  <link rel="stylesheet" href="/main.min.css?v=1">
  <link rel="alternate" type="application/atom+xml" title="RSS of blog.salon" href="//blog.salon/feed.xml">

</head>
